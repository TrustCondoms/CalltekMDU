<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>🌿 Altice RXG Dashboard 🌾</title>

<!-- Pixel + cozy font -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root{
    --accent-dark: #3e5a27;
    --accent-mid: #5a7d3b;
    --text: #2f3e2f;
    --card-bg: rgba(255,248,220,0.95);
    --section-bg: rgba(240,248,255,0.9);
  }

  html,body{
    height:100%;
    margin:0;
  }

  body {
    margin: 0;
    /* Background image with a soft green gradient overlay for readability */
    background:
      linear-gradient(rgba(143,214,148,0.65), rgba(199,233,176,0.65)),
      url("https://imgcdn.stablediffusionweb.com/2024/4/4/d528219e-f39f-494f-9709-366078b63081.jpg") center/cover no-repeat fixed;
    background-blend-mode: overlay;
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  /* HEADER */
  header {
    font-family: 'Press Start 2P', cursive;
    background: rgba(90,125,59,0.95);
    color: #fff;
    text-align: center;
    padding: 18px;
    border-bottom: 6px solid var(--accent-dark);
    font-size: 14px;
  }

  /* LAYOUT */
  .container {
    padding: 20px;
    text-align: center;
    max-width:1200px;
    margin: 0 auto;
  }

  /* SEARCH */
  .search-bar {
    padding: 12px;
    width: 80%;
    max-width: 500px;
    border: 4px solid var(--accent-dark);
    border-radius: 10px;
    background: #fff8dc;
    font-size: 14px;
    margin-bottom: 20px;
  }

  /* GRID */
  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    align-items: start;
  }

  /* CARD (GAME PANEL STYLE) */
  .card {
    background: var(--card-bg);
    border: 5px solid var(--accent-dark);
    border-radius: 12px;
    padding: 15px;
    box-shadow: 6px 6px 0 var(--accent-dark);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    text-align: left;
    position: relative;
    min-height:120px;
  }

  /* SECTION HEADER (separator for groups like ALTICE / WORLDVUE) */
  .section-header {
    grid-column: 1 / -1;
    background: var(--section-bg);
    border: 4px dashed var(--accent-dark);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'Press Start 2P';
    color: var(--accent-mid);
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.06);
  }

  /* TITLE */
  .property-name {
    grid-column: span 2;
    font-family: 'Press Start 2P';
    font-size: 12px;
    color: var(--accent-mid);
    margin-bottom: 8px;
  }

  /* LINKS */
  a {
    color: #2a7f62;
    font-weight: bold;
    text-decoration: none;
  }
  a:hover { text-decoration: underline; }

  /* BUTTONS */
  .btn {
    font-family: 'Press Start 2P';
    font-size: 10px;
    padding: 8px;
    border: 3px solid var(--accent-dark);
    background: #dcedc1;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--accent-dark);
  }

  .btn:active {
    transform: translate(2px,2px);
    box-shadow: none;
  }

  .btn-delete {
    background: #ff8b94;
  }

  /* COPY BUTTON */
  .copy-btn {
    font-size: 10px;
    margin-left: 5px;
    padding: 4px;
    border: 2px solid var(--accent-dark);
    background: #ffd3b6;
    cursor: pointer;
  }

  /* COPY FEEDBACK */
  .copy-msg {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-size: 10px;
    color: green;
    display: none;
  }

  /* ACTION ROW */
  .card-buttons {
    grid-column: span 2;
    display: flex;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  /* small label for credentials */
  .cred-label {
    font-size: 11px;
    color: #4a4a4a;
    display:inline-block;
    width:36px;
  }

  /* Make sure inputs and buttons remain readable on top of the background */
  input, button {
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }

  /* Responsive tweaks */
  @media (max-width:420px){
    .search-bar { width: 95%; }
    .card { padding:12px; }
    header { font-size:12px; padding:14px; }
  }
</style>
</head>

<body>

<header>🌿 ALTICE RXG DASHBOARD 🌾</header>

<div class="container">
  <input id="search" class="search-bar" placeholder="Search property...">

  <div id="dashboard" class="dashboard"></div>

  <div style="margin-top:20px;">
    <button class="btn" onclick="addProperty()">+ ADD</button>
    <button class="btn btn-delete" onclick="resetProperties()">RESET</button>
  </div>
</div>

<script>
  // Global fallback credentials used previously for ALTICE display
  const GLOBAL_USERNAME = "calltek1";
  const GLOBAL_PASSWORD = "82sX9*SER@2f";

  // Default properties include group field to allow separators
  const defaultProperties = [
    { group: "ALTICE", name: "Arbors at Sam Houston", rxg: "#", controller: "", type: "Wired", asbuilt: "" },
    { group: "ALTICE", name: "304 Valley Pointe", rxg: "#", controller: "", type: "Wired & Wireless", asbuilt: "" },

    // WORLDVUE section (new entries requested) with provided credentials
    { group: "WORLDVUE", name: "RgNET- RENOV", rxg: "https://c01414-renonv.impruvix.net/admin", controller: "", type: "RgNET", asbuilt: "", user: "sacosta", pass: "sacosta2002", note: "RgNET accounts share same UN/PW" },
    { group: "WORLDVUE", name: "RgNET- JACKSONVILLEL", rxg: "https://c01462-jacksonvillefl.impruvix.net/admin", controller: "", type: "RgNET", asbuilt: "", user: "sacosta", pass: "sacosta2002" },
    { group: "WORLDVUE", name: "RgNET- YAKIMAWA", rxg: "https://c01455-yakimawa.impruvix.net/admin", controller: "", type: "RgNET", asbuilt: "", user: "sacosta", pass: "sacosta2002" },

    { group: "WORLDVUE", name: "Cambium", rxg: "https://us-e1-s17-6kjx94x0zv.cloud.cambiumnetworks.com/#/0/home-view/home", controller: "", type: "Cambium", asbuilt: "", user: "dispatch@worldvue.com", pass: "WorldVue2024!" },

    { group: "WORLDVUE", name: "Vic Properties WLI", rxg: "https://wcitv.wifikey.io/networkdashboard", controller: "", type: "WLI", asbuilt: "", user: "ava_oberes@calltekinc.com", pass: "4v4&W0rLdVue!" },

    { group: "WORLDVUE", name: "NetExperience (leasing agents)", rxg: "https://netexperience-prod.us.auth0.com/u/login", controller: "", type: "NetExperience", asbuilt: "", user: "calltekaccounts@wcitv.com", pass: "1qaz!QAZ" },

    { group: "WORLDVUE", name: "Microsoft Authenticator - forticlient.worldvue.com", rxg: "https://forticlient.worldvue.com", controller: "", type: "Auth", asbuilt: "", user: "Sienna", pass: "sacosta" }
  ];

  function loadProperties(){
    const saved = JSON.parse(localStorage.getItem('properties')) || [];
    // If saved is empty, initialize with defaults
    if(!saved || saved.length === 0){
      localStorage.setItem('properties', JSON.stringify(defaultProperties));
      return defaultProperties.slice();
    }
    // Merge defaults with saved, preserving any new defaults not present in saved
    const merged = [];
    const names = new Set(saved.map(s => s.name));
    saved.forEach(s => merged.push(s));
    defaultProperties.forEach(d => {
      if(!names.has(d.name)) merged.push(d);
    });
    localStorage.setItem('properties', JSON.stringify(merged));
    return merged;
  }

  function saveProperties(p){
    localStorage.setItem('properties', JSON.stringify(p));
  }

  // Render grouped by group order: ALTICE then WORLDVUE (alphabetical by group)
  function renderDashboard(props){
    const dash = document.getElementById("dashboard");
    dash.innerHTML = "";

    // Determine group order from props (preserve ALTICE first if present)
    const groups = Array.from(new Set(props.map(p => p.group || "ALTICE")));
    // Ensure ALTICE appears first if present
    groups.sort((a,b)=>{
      if(a === "ALTICE") return -1;
      if(b === "ALTICE") return 1;
      return a.localeCompare(b);
    });

    groups.forEach(group => {
      // Section header
      const headerCard = document.createElement("div");
      headerCard.className = "section-header";
      headerCard.textContent = group;
      dash.appendChild(headerCard);

      // Render items in this group
      props.filter(p => (p.group || "ALTICE") === group).forEach((p, idx)=>{
        const card = document.createElement("div");
        card.className = "card";

        // Determine which username/password to show: use p.user/p.pass if present, otherwise fallback to global
        const displayUser = p.user ? p.user : GLOBAL_USERNAME;
        const displayPass = p.pass ? p.pass : GLOBAL_PASSWORD;

        // Build credential display if present
        const userHtml = `<div><span class="cred-label">UN:</span> <strong id="un-${escapeId(p.name)}">${escapeHtml(displayUser)}</strong> <button class="copy-btn" onclick="copyText('${escapeJs(displayUser)}')">COPY UN</button></div>`;
        const passHtml = `<div><span class="cred-label">PW:</span> <strong id="pw-${escapeId(p.name)}">${escapeHtml(displayPass)}</strong> <button class="copy-btn" onclick="copyText('${escapeJs(displayPass)}')">COPY PW</button></div>`;

        card.innerHTML = `
          <div class="property-name">${escapeHtml(p.name)}</div>

          <div>🌐 ${p.rxg ? `<a href="${escapeAttr(p.rxg)}" target="_blank">LINK</a>` : "RXG: N/A"}</div>
          <div>💻 ${p.controller ? `<a href="${escapeAttr(p.controller)}" target="_blank">CTRL</a>` : "CTRL: N/A"}</div>

          <div>📶 ${escapeHtml(p.type || "")}</div>
          <div>📄 ${p.asbuilt ? `<a href="${escapeAttr(p.asbuilt)}" target="_blank">DOC</a>` : "DOC: N/A"}</div>

          <div style="grid-column: span 2; margin-top:6px;">
            ${userHtml}
            ${passHtml}
            ${p.note ? `<div style="margin-top:6px; font-size:11px; color:#555;">${escapeHtml(p.note)}</div>` : ""}
          </div>

          <div class="card-buttons">
            <button class="btn" onclick="editPropertyByName('${escapeJs(p.name)}')">EDIT</button>
            <button class="btn btn-delete" onclick="deletePropertyByName('${escapeJs(p.name)}')">DEL</button>
          </div>

          <div class="copy-msg" id="msg-${escapeId(p.name)}">Copied!</div>
        `;

        dash.appendChild(card);
      });
    });
  }

  // Generic copy helper for arbitrary text
  function copyText(text){
    if(!text) return;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).catch(()=>{});
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch(e){}
      ta.remove();
    }
    // show a brief global message (not tied to a specific card)
    const msg = document.createElement('div');
    msg.textContent = "Copied!";
    msg.style.position = "fixed";
    msg.style.right = "16px";
    msg.style.bottom = "16px";
    msg.style.background = "#dff0d8";
    msg.style.border = "2px solid #3e5a27";
    msg.style.padding = "8px 12px";
    msg.style.borderRadius = "8px";
    msg.style.fontSize = "12px";
    msg.style.boxShadow = "3px 3px 0 rgba(0,0,0,0.08)";
    document.body.appendChild(msg);
    setTimeout(()=> msg.remove(), 1100);
  }

  // Add property (asks for group as well)
  function addProperty(){
    const group = prompt("Group (e.g., ALTICE or WORLDVUE):", "ALTICE");
    if(group === null) return;
    const name = prompt("Name:");
    if(!name) return;
    const type = prompt("Type:") || "";
    const rxg = prompt("RXG:") || "";
    const controller = prompt("Controller:") || "";
    const asbuilt = prompt("AsBuilt:") || "";
    const user = prompt("Username (optional):") || "";
    const pass = prompt("Password (optional):") || "";
    const note = prompt("Note (optional):") || "";

    const p = loadProperties();
    p.unshift({group: group.toUpperCase(), name, type, rxg, controller, asbuilt, user, pass, note});
    saveProperties(p);
    renderDashboard(p);
  }

  // Edit by name (safer than index since groups reorder)
  function editPropertyByName(name){
    const p = loadProperties();
    const idx = p.findIndex(x => x.name === name);
    if(idx === -1) return alert("Item not found");
    const item = p[idx];

    const newGroup = prompt("Group:", item.group) || item.group;
    const newName = prompt("Name:", item.name);
    if(newName === null) return;
    const newType = prompt("Type:", item.type) || item.type;
    const newRxg = prompt("RXG:", item.rxg) || item.rxg;
    const newCtrl = prompt("CTRL:", item.controller) || item.controller;
    const newDoc = prompt("DOC:", item.asbuilt) || item.asbuilt;
    const newUser = prompt("Username:", item.user || "") || item.user;
    const newPass = prompt("Password:", item.pass || "") || item.pass;
    const newNote = prompt("Note:", item.note || "") || item.note;

    item.group = newGroup.toUpperCase();
    item.name = newName;
    item.type = newType;
    item.rxg = newRxg;
    item.controller = newCtrl;
    item.asbuilt = newDoc;
    item.user = newUser;
    item.pass = newPass;
    item.note = newNote;

    saveProperties(p);
    renderDashboard(p);
  }

  function deletePropertyByName(name){
    const p = loadProperties();
    if(!confirm("Delete?")) return;
    const idx = p.findIndex(x => x.name === name);
    if(idx === -1) return;
    p.splice(idx,1);
    saveProperties(p);
    renderDashboard(p);
  }

  function resetProperties(){
    if(confirm("Reset all?")){
      localStorage.removeItem('properties');
      renderDashboard(defaultProperties.slice());
    }
  }

  // Search
  document.getElementById("search").addEventListener("input",function(){
    const val = this.value.toLowerCase();
    const filtered = loadProperties().filter(p =>
      (p.name || "").toLowerCase().includes(val) ||
      (p.type || "").toLowerCase().includes(val) ||
      (p.group || "").toLowerCase().includes(val)
    );
    renderDashboard(filtered);
  });

  // Helpers to escape HTML and attributes
  function escapeHtml(str){
    if(str === undefined || str === null) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }
  function escapeAttr(str){
    if(!str) return "#";
    // Basic attribute escaping
    return String(str)
      .replace(/&/g, "%26")
      .replace(/"/g, "%22")
      .replace(/'/g, "%27")
      .replace(/</g, "%3C")
      .replace(/>/g, "%3E");
  }
  function escapeId(str){
    if(!str) return "";
    return String(str).replace(/\s+/g,'-').replace(/[^A-Za-z0-9\-_]/g,'');
  }
  function escapeJs(str){
    if(str === undefined || str === null) return "";
    return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,'\\n');
  }

  // Initialize
  renderDashboard(loadProperties());
</script>

</body>
</html>
